{% extends 'base.html' %}
{% load static %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-cog"></i> Settings
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="{{ form.coinmarketcap_api_key.id_for_label }}" class="form-label">
                            {{ form.coinmarketcap_api_key.label }}
                        </label>
                        <div class="input-group">
                            {{ form.coinmarketcap_api_key }}
                            <button class="btn btn-outline-secondary" type="button" id="toggleApiKey">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                        {% if form.coinmarketcap_api_key.errors %}
                            <div class="text-danger small">{{ form.coinmarketcap_api_key.errors.0 }}</div>
                        {% endif %}
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{% url 'platform_list' %}" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-save"></i> Save Settings
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('toggleApiKey').addEventListener('click', function() {
    const apiKeyField = document.getElementById('{{ form.coinmarketcap_api_key.id_for_label }}');
    const toggleIcon = document.getElementById('toggleIcon');
    
    if (apiKeyField.type === 'password') {
        apiKeyField.type = 'text';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
    } else {
        apiKeyField.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
    }
});
</script>
{% endblock %}
