{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mining Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/theme.css' %}" rel="stylesheet">
    <style>
        body {
            background-color: #0a0e17;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 1rem;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.07),
                         0 0 60px rgba(0, 212, 255, 0.03);
            backdrop-filter: blur(12px);
        }

        .login-icon {
            color: #00d4ff;
            font-size: 2.5rem;
        }

        .login-title {
            color: #e2e8f0;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        .form-control {
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.06);
            border-color: #00d4ff;
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 255, 0.15);
            color: #e2e8f0;
        }

        .form-label {
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.875rem;
        }

        .btn-cyan {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            color: #0a0e17;
            font-weight: 600;
            padding: 0.6rem 1rem;
            transition: opacity 0.2s, box-shadow 0.2s;
        }

        .btn-cyan:hover {
            background: linear-gradient(135deg, #00e5ff, #00aadd);
            color: #0a0e17;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn-cyan:active {
            background: linear-gradient(135deg, #00bbdd, #0088bb);
            color: #0a0e17;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="col-11 col-sm-8 col-md-5 col-lg-4 col-xl-3">
        <div class="login-card p-4 p-sm-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-bitcoin-sign login-icon mb-3"></i>
                <h4 class="login-title mb-0">Mining Manager</h4>
            </div>

            {% if error %}
            <div class="alert alert-danger d-flex align-items-center py-2 mb-4" role="alert">
                <i class="fa-solid fa-circle-exclamation me-2"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" autofocus required>
                </div>
                <button type="submit" class="btn btn-cyan w-100">
                    <i class="fa-solid fa-right-to-bracket me-1"></i> Log In
                </button>
            </form>
        </div>
    </div>
</body>
</html>
